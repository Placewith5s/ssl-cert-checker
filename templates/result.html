<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0" />
        <title>Result</title>
        <link rel="stylesheet" href="static/style.css" />
    </head>

    <body>
        <header>
            <h1>Result</h1>
        </header>

        <main>
            <p class="spaced-top">
                <strong>URL: </strong>
                <a
                    href="{{url}}"
                    target="_blank"
                    rel="noopener noreferrer"
                    title="opens in a new tab"
                    >{{ url }}</a
                >
            </p>
            <p><strong>Message:</strong> {{ result }}</p>
        </main>
    </body>
</html>
